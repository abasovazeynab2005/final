<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Characters | Janitor Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЭКРАН С ПЕРСОНАЖАМИ -->
    <div class="characters-screen" id="charactersScreen">
        <h1>Выбери персонажа</h1>
        <div class="characters-grid" id="charactersGrid"></div>
    </div>

    <!-- ОКНО ЧАТА (сначала скрыто) -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-container">
            <div class="chat-header" id="chatHeader">
                <button class="back-btn" id="backBtn">←</button>
                <div class="chat-title">
                    <span id="charName">Персонаж</span>
                </div>
                <button class="close-btn" id="closeBtn">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="bubble">Привет! Я готов помочь </div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Напиши сообщение..." autocomplete="off">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
